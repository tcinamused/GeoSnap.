<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GeoSnap</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body, html {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background-color: #eaffea;
    }

    .screen {
      display: none;
      height: 100vh;
      width: 100%;
      text-align: center;
      padding-top: 2cm;
    }

    .screen.active {
      display: block;
    }

    img.logo {
      width: 260px;
      margin-bottom: 30px;
    }

    h1 { font-size: 42px; }
    h2 { font-size: 34px; }
    p  { font-size: 22px; margin: 20px; }

    .menu-item {
      font-size: 24px;
      margin: 12px 0;
    }

    .button-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      margin-top: 30px;
    }

    button {
      font-size: 22px;
      padding: 16px 32px;
      border: none;
      border-radius: 12px;
      background-color: #4CAF50;
      color: white;
      cursor: pointer;
      min-width: 220px;
    }

    button:hover {
      background-color: #45a049;
    }

    a {
      font-size: 22px;
      color: blue;
      text-decoration: underline;
    }

    .spacer { height: 4cm; }

    #qr-reader {
      width: 300px;
      margin: 20px auto;
    }
  </style>
</head>

<body>

<!-- START -->
<div id="startScreen" class="screen active">
  <img src="logo.png" class="logo">
  <div class="button-container">
    <button onclick="showScreen('homeScreen')">Continue</button>
  </div>
</div>

<!-- HOME -->
<div id="homeScreen" class="screen">
  <h1>Geosnap</h1>
  <img src="logo.png" class="logo">
  <p><b>Win en maak kans op een zelfgekozen prijs!</b></p>

  <div class="button-container">
    <button onclick="showScreen('menuScreen')">Menu</button>
    <button onclick="showScreen('playScreen')">Speel mee!</button>
  </div>
</div>

<!-- MENU -->
<div id="menuScreen" class="screen">
  <h2>Wat kan je kopen?</h2>

  <div class="menu-item">🍦 IJsje – 540 punten</div>
  <div class="menu-item">🍬 Snoep – 250 punten</div>
  <div class="menu-item">🍫 Twix – 250 punten</div>
  <div class="menu-item">🥤 Dranken – 350 punten</div>
  <div class="menu-item">🍟 Chips – 300 punten</div>
  <div class="menu-item">🍪 Koekjes – 250 punten</div>

  <div class="button-container">
    <button onclick="showScreen('homeScreen')">⬅ Terug</button>
  </div>
</div>

<!-- SPEEL MEE -->
<div id="playScreen" class="screen">
  <h2>Speel mee</h2>

  <a href="https://whatsapp.com/channel/0029Vb73gJ3JuyALJERSdi0W" target="_blank">
    WhatsApp kanaal openen
  </a>

  <div class="spacer"></div>

  <div class="button-container">
    <button onclick="startQR()">QR code scannen</button>
    <button onclick="showScreen('homeScreen')">⬅ Terug</button>
  </div>

  <div id="qr-reader"></div>
</div>

<script>
let scanner = null;

function showScreen(id) {
  stopQR();
  document.querySelectorAll(".screen").forEach(screen => {
    screen.classList.remove("active");
  });
  document.getElementById(id).classList.add("active");
}

async function startQR() {
  const qrContainer = document.getElementById("qr-reader");
  qrContainer.innerHTML = "";

  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    alert("Camera wordt niet ondersteund.");
    return;
  }

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment" }
    });
    stream.getTracks().forEach(track => track.stop());
  } catch (err) {
    alert("Camera permissie geweigerd of geblokkeerd.");
    return;
  }

  scanner = new Html5Qrcode("qr-reader");

  scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    (decodedText) => {
      stopQR();
      let url = decodedText.trim();

      if (!url.startsWith("http://") && !url.startsWith("https://")) {
        alert("Geen geldige link QR-code.");
        return;
      }

      window.location.href = url;
    }
  ).catch(err => {
    alert("Camera kon niet gestart worden.");
    console.error(err);
  });
}

function stopQR() {
  if (scanner) {
    scanner.stop().then(() => {
      scanner.clear();
      scanner = null;
    }).catch(() => {});
  }
}
</script>

</body>
</html>
